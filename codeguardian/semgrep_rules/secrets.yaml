rules:
  - id: hardcoded-aws-key
    pattern-regex: "AKIA[0-9A-Z]{16}"
    message: "Hardcoded AWS access key detected"
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: CWE-798

  - id: hardcoded-private-key
    pattern-regex: "-----BEGIN (?:RSA |EC )?PRIVATE KEY-----"
    message: "Private key found in source code"
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: CWE-321
