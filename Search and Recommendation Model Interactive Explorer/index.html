<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaped Model Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white min-h-screen">
  <div id="root"></div>
  <script>
    fetch('ShapedModelExplorer.jsx')
      .then(r => r.text())
      .then(code => {
        const out = Babel.transform(code + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ShapedModelExplorer));', { presets: ['react'] }).code;
        const s = document.createElement('script');
        s.textContent = out;
        document.body.appendChild(s);
      })
      .catch(err => {
        document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:2rem;font-family:monospace;">Error: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
