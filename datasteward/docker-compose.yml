version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: datasteward
      POSTGRES_PASSWORD: datasteward
      POSTGRES_DB: datasteward
    volumes:
      - pg_data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000

volumes:
  pg_data:
