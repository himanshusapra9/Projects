version: "3.9"
services:
  dashboard:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    working_dir: /app

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://dashboard:8000
