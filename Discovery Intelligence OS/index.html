<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery Intelligence OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white min-h-screen">
  <div id="root"></div>
  <script>
    fetch('ShapedModelExplorer.jsx')
      .then(r => r.text())
      .then(code => {
        try {
          var out = Babel.transform(code + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));', { presets: ['react'] }).code;
          var s = document.createElement('script');
          s.textContent = out;
          document.body.appendChild(s);
        } catch(e) {
          document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:2rem;font-family:monospace;white-space:pre-wrap;">Babel Error: ' + e.message + '</div>';
        }
      })
      .catch(err => {
        document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:2rem;font-family:monospace;white-space:pre-wrap;">Fetch Error: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
